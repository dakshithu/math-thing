<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON_STRIKE // WORLD_ELITE</title>
    <link rel="stylesheet" href="style.css">
    <meta name="google-adsense-account" content="ca-pub-8598845555450611">
</head>
<body>
    <div id="timer-container"><div id="timer-bar"></div></div>

    <div id="game-ui">
        <div id="eqn">---</div>
        <input type="number" id="ans" autofocus autocomplete="off">
    </div>

    <div id="stats-bar">
        <div class="stat-box">CURRENT_STREAK: <span id="combo-count" class="highlight">0</span></div>
        <div class="stat-box">WORLD_RECORD: <span id="high-score" class="highlight">SYNCING...</span></div>
    </div>

    <div id="game-over">
        <h1>SYSTEM_CRASH</h1>
        <p>STREAK_ENDED: <span id="final-score" class="highlight">0</span></p>
        <button id="retry-btn" onclick="location.reload()">REBOOT_SYSTEM</button>
    </div>

    <canvas id="canvas"></canvas>
    <script src="script.js"></script>
    <script>
        document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    // The user has come back to the tab
    console.log("Welcome back! Refreshing for latest updates...");
    window.location.reload();
  }
});
    </script>
</body>
</html>
